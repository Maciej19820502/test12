<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Finance Tutor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .phase-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .phase-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .phase-assessment {
            background: #fff3cd;
            color: #856404;
        }

        .phase-lesson {
            background: #d4edda;
            color: #155724;
        }

        .timer {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            font-weight: bold;
            color: #495057;
        }

        .progress-container {
            padding: 0 25px;
            padding-top: 15px;
        }

        .progress-bar {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
            width: 0%;
        }

        .chat-container {
            height: 450px;
            overflow-y: auto;
            padding: 25px;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .bot .avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .user .avatar {
            background: #e9ecef;
        }

        .message-content {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .bot .message-content {
            background: #f1f3f4;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .user .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 14px 18px;
            background: #f1f3f4;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-container {
            padding: 20px 25px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 12px;
        }

        .input-container input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            border-color: #667eea;
        }

        .input-container button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .input-container button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .knowledge-summary {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .knowledge-summary h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .knowledge-level {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .level-beginner { background: #cce5ff; color: #004085; }
        .level-intermediate { background: #fff3cd; color: #856404; }
        .level-advanced { background: #d4edda; color: #155724; }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .quick-reply {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 20px;
            color: #667eea;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .quick-reply:hover {
            background: #667eea;
            color: white;
        }

        .lesson-topic {
            background: rgba(102, 126, 234, 0.1);
            padding: 12px 16px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: 500;
        }

        .restart-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .restart-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Adaptive Finance Tutor</h1>
            <p>Personalized learning experience tailored to your knowledge level</p>
        </div>

        <div class="status-bar">
            <div class="phase-indicator">
                <span>Phase:</span>
                <span id="phase-badge" class="phase-badge phase-assessment">Knowledge Assessment</span>
            </div>
            <div class="timer" id="timer">04:00</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="chat-container" id="chat-container"></div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Type your response..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // State Management
        const state = {
            phase: 'assessment', // 'assessment' or 'lesson'
            questionIndex: 0,
            score: 0,
            maxScore: 0,
            responses: [],
            knowledgeLevel: null,
            timeRemaining: 240, // 4 minutes in seconds
            timerInterval: null,
            lessonStep: 0,
            assessmentComplete: false
        };

        // Assessment Questions (Adaptive)
        const assessmentQuestions = [
            {
                question: "Welcome! I'm your finance tutor. Let's start with something simple: What do you think is the main purpose of a budget?",
                keywords: ['track', 'spend', 'income', 'expense', 'plan', 'money', 'control', 'save', 'allocate'],
                advancedKeywords: ['cash flow', 'forecast', 'variance', 'zero-based'],
                points: 1,
                followUp: true
            },
            {
                question: "Good! Now, can you explain what compound interest is and why it matters for savings or investments?",
                keywords: ['interest', 'earn', 'grow', 'principal', 'time', 'accumulate'],
                advancedKeywords: ['exponential', 'compounding period', 'annual', 'APY', 'rule of 72'],
                points: 2,
                followUp: true
            },
            {
                question: "Let's talk about investments. What's the difference between stocks and bonds?",
                keywords: ['ownership', 'equity', 'debt', 'company', 'risk', 'return', 'dividend', 'interest'],
                advancedKeywords: ['volatility', 'fixed income', 'credit rating', 'yield', 'maturity', 'capital appreciation'],
                points: 2,
                followUp: true
            },
            {
                question: "How would you explain diversification in investing, and why is it important?",
                keywords: ['spread', 'risk', 'different', 'asset', 'portfolio', 'variety', 'protect'],
                advancedKeywords: ['correlation', 'asset class', 'systematic risk', 'unsystematic', 'modern portfolio theory', 'allocation'],
                points: 2,
                followUp: true
            },
            {
                question: "What do you know about inflation and how it affects your money over time?",
                keywords: ['price', 'increase', 'value', 'purchasing power', 'cost', 'rise'],
                advancedKeywords: ['CPI', 'real return', 'nominal', 'deflation', 'hyperinflation', 'fed', 'monetary policy'],
                points: 2,
                followUp: true
            },
            {
                question: "Can you describe what a credit score is and mention some factors that affect it?",
                keywords: ['credit', 'borrow', 'history', 'payment', 'score', 'loan', 'report'],
                advancedKeywords: ['FICO', 'utilization', 'credit mix', 'hard inquiry', 'soft inquiry', 'derogatory marks'],
                points: 2,
                followUp: false
            }
        ];

        // Lesson Content by Level
        const lessonContent = {
            beginner: {
                title: "Finance Fundamentals",
                topics: [
                    {
                        name: "Understanding Money Basics",
                        content: "Let's start with the foundation! Money serves three key purposes: it's a medium of exchange (you use it to buy things), a store of value (you can save it), and a unit of account (you measure prices with it).",
                        question: "Think about your daily life - which of these three purposes do you interact with most often?",
                        tips: ["Try tracking every purchase for a week", "Notice how prices are displayed everywhere"]
                    },
                    {
                        name: "Building Your First Budget",
                        content: "A budget is simply a plan for your money. The easiest method is the 50/30/20 rule: 50% for needs (rent, food, utilities), 30% for wants (entertainment, dining out), and 20% for savings and debt repayment.",
                        question: "If you earned $1000, how would you divide it using this rule?",
                        tips: ["Start by listing all your monthly expenses", "Use apps like Mint or YNAB to help track"]
                    },
                    {
                        name: "The Power of Saving",
                        content: "Saving money means setting aside part of your income for future use. A good first goal is building an emergency fund - typically 3-6 months of expenses. This protects you from unexpected costs like car repairs or medical bills.",
                        question: "What unexpected expense have you faced recently that an emergency fund could have helped with?",
                        tips: ["Start small - even $25/month adds up", "Automate your savings with direct deposit"]
                    },
                    {
                        name: "Introduction to Compound Interest",
                        content: "Here's the magic of finance! Compound interest means you earn interest on your interest. If you invest $1000 at 7% annual return, after year 1 you have $1070. Year 2? You earn 7% on $1070, giving you $1145. This snowball effect is how wealth builds over time!",
                        question: "If your money doubles every 10 years with compound interest, how much would $1000 become in 30 years?",
                        tips: ["Rule of 72: divide 72 by your interest rate to estimate doubling time", "Start investing early - time is your biggest advantage"]
                    }
                ]
            },
            intermediate: {
                title: "Building Financial Intelligence",
                topics: [
                    {
                        name: "Investment Vehicles Deep Dive",
                        content: "Beyond basic stocks and bonds, let's explore: ETFs (Exchange-Traded Funds) bundle multiple assets and trade like stocks, offering diversification at low cost. Index funds track market indices like the S&P 500. Mutual funds are professionally managed but often have higher fees.",
                        question: "Given that most actively managed funds underperform index funds over time, what strategy might be most effective for a long-term investor?",
                        tips: ["Compare expense ratios before investing", "Consider tax-advantaged accounts like 401(k) and IRA first"]
                    },
                    {
                        name: "Understanding Risk and Return",
                        content: "Risk and return are fundamentally linked - higher potential returns come with higher risk. Standard deviation measures volatility. Beta compares an asset's volatility to the market. Sharpe ratio measures risk-adjusted returns. A well-constructed portfolio balances these factors based on your timeline and risk tolerance.",
                        question: "A 25-year-old and a 60-year-old both have $100,000 to invest. How should their portfolios differ and why?",
                        tips: ["Your risk capacity decreases as you approach needing the money", "Rebalance your portfolio annually"]
                    },
                    {
                        name: "Tax-Efficient Investing",
                        content: "Investment returns are affected by taxes. Long-term capital gains (assets held >1 year) are taxed at lower rates than short-term gains. Tax-loss harvesting involves selling losing investments to offset gains. Placing high-dividend investments in tax-advantaged accounts optimizes your after-tax returns.",
                        question: "If you're in the 22% tax bracket and have $5000 in capital gains, what's the difference between short-term and long-term capital gains tax (assume 15% long-term rate)?",
                        tips: ["Max out tax-advantaged accounts before taxable investing", "Hold investments for at least a year when possible"]
                    },
                    {
                        name: "Debt Management Strategies",
                        content: "Not all debt is equal. High-interest debt (credit cards at 20%+) should be eliminated first - either through the avalanche method (highest interest first) or snowball method (smallest balance first for psychological wins). Low-interest debt (mortgage at 3-4%) may be worth keeping if you can invest at higher returns.",
                        question: "If you have $10,000 in credit card debt at 20% APR and $10,000 to invest potentially earning 10%, what should you do and why?",
                        tips: ["Always pay more than minimums when possible", "Consider balance transfer cards for high-interest debt"]
                    }
                ]
            },
            advanced: {
                title: "Advanced Financial Strategies",
                topics: [
                    {
                        name: "Portfolio Theory and Asset Allocation",
                        content: "Modern Portfolio Theory (MPT) demonstrates that diversification can optimize risk-adjusted returns. The efficient frontier represents portfolios offering maximum expected return for each level of risk. Correlation between assets is key - combining negatively correlated assets reduces overall volatility without proportionally reducing expected returns.",
                        question: "How might the correlation between stocks and bonds change during a financial crisis, and what implications does this have for 'safe' portfolios?",
                        tips: ["Consider alternative assets like REITs, commodities, or international equities for true diversification", "Regularly analyze your portfolio's actual correlation matrix"]
                    },
                    {
                        name: "Options and Derivatives",
                        content: "Options provide leverage and hedging capabilities. A call option gives the right to buy at a strike price; a put gives the right to sell. The Greeks (Delta, Gamma, Theta, Vega) quantify option sensitivities. Strategies like covered calls generate income, while protective puts provide insurance. Understanding implied volatility versus historical volatility is crucial for option pricing.",
                        question: "If you own 100 shares of a stock at $50 and sell a covered call with a $55 strike for $2 premium, what's your maximum profit and at what price is it achieved?",
                        tips: ["Never sell naked calls - unlimited risk", "Use options for income generation in sideways markets"]
                    },
                    {
                        name: "Advanced Tax Planning",
                        content: "Beyond basic tax-advantaged accounts, consider: Roth conversion ladders for early retirement, backdoor Roth contributions if over income limits, mega backdoor Roth through after-tax 401(k) contributions, qualified opportunity zone investments for capital gains deferral, and charitable remainder trusts for philanthropic tax efficiency.",
                        question: "A high-earner expects to be in a lower tax bracket in retirement. Should they prioritize traditional or Roth contributions now, and what strategy might change this calculation?",
                        tips: ["Model different scenarios using tax projection software", "Consider state tax implications if planning to relocate in retirement"]
                    },
                    {
                        name: "Behavioral Finance and Market Psychology",
                        content: "Markets aren't perfectly efficient due to human psychology. Key biases include: loss aversion (losses hurt 2x more than equivalent gains), anchoring (over-relying on first information), recency bias (overweighting recent events), and herding (following the crowd). Understanding these biases in yourself and the market creates opportunities.",
                        question: "During a market crash when your portfolio is down 30%, your instinct is to sell everything. Using behavioral finance principles, construct an argument for why this instinct exists and why it's often wrong.",
                        tips: ["Create an investment policy statement during calm times", "Automate investing to remove emotional decisions"]
                    }
                ]
            }
        };

        // Initialize
        function init() {
            startTimer();
            setTimeout(() => {
                addBotMessage(assessmentQuestions[0].question);
            }, 500);
        }

        // Timer Functions
        function startTimer() {
            updateTimerDisplay();
            state.timerInterval = setInterval(() => {
                state.timeRemaining--;
                updateTimerDisplay();
                updateProgress();

                if (state.timeRemaining <= 0 && state.phase === 'assessment') {
                    completeAssessment();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(state.timeRemaining / 60);
            const seconds = state.timeRemaining % 60;
            document.getElementById('timer').textContent =
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateProgress() {
            const totalTime = 240;
            const elapsed = totalTime - state.timeRemaining;
            const percentage = (elapsed / totalTime) * 100;
            document.getElementById('progress-fill').style.width = `${percentage}%`;
        }

        // Message Functions
        function addBotMessage(text, isHTML = false) {
            const container = document.getElementById('chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="message-content">${isHTML ? text : escapeHtml(text)}</div>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function addUserMessage(text) {
            const container = document.getElementById('chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            messageDiv.innerHTML = `
                <div class="avatar">👤</div>
                <div class="message-content">${escapeHtml(text)}</div>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chat-container');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Assessment Logic
        function analyzeResponse(response, question) {
            const lowerResponse = response.toLowerCase();
            let points = 0;
            let foundKeywords = 0;
            let foundAdvanced = 0;

            // Check for basic keywords
            question.keywords.forEach(keyword => {
                if (lowerResponse.includes(keyword.toLowerCase())) {
                    foundKeywords++;
                }
            });

            // Check for advanced keywords
            question.advancedKeywords.forEach(keyword => {
                if (lowerResponse.includes(keyword.toLowerCase())) {
                    foundAdvanced++;
                }
            });

            // Calculate points
            if (foundKeywords >= 2) points += question.points * 0.5;
            if (foundKeywords >= 4) points += question.points * 0.25;
            if (foundAdvanced >= 1) points += question.points * 0.5;
            if (foundAdvanced >= 2) points += question.points * 0.25;

            // Bonus for detailed responses
            if (response.split(' ').length > 20) points += 0.5;

            return Math.min(points, question.points * 1.5);
        }

        function generateFeedback(response, question, score) {
            const maxPoints = question.points * 1.5;
            const percentage = score / maxPoints;

            if (percentage >= 0.8) {
                return "Excellent understanding! You clearly have strong knowledge in this area. ";
            } else if (percentage >= 0.5) {
                return "Good grasp of the concept! You've covered the key points. ";
            } else if (percentage >= 0.2) {
                return "You have a basic understanding. Let's build on that. ";
            } else {
                return "That's a great starting point. This is exactly why we're here to learn! ";
            }
        }

        function determineKnowledgeLevel() {
            const maxPossibleScore = assessmentQuestions.reduce((sum, q) => sum + q.points * 1.5, 0);
            const percentage = state.score / maxPossibleScore;

            if (percentage >= 0.65) {
                return 'advanced';
            } else if (percentage >= 0.35) {
                return 'intermediate';
            } else {
                return 'beginner';
            }
        }

        // Send Message
        function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();

            if (!message) return;

            addUserMessage(message);
            input.value = '';

            if (state.phase === 'assessment') {
                handleAssessmentResponse(message);
            } else {
                handleLessonResponse(message);
            }
        }

        function handleAssessmentResponse(response) {
            const currentQuestion = assessmentQuestions[state.questionIndex];

            // Analyze response
            const score = analyzeResponse(response, currentQuestion);
            state.score += score;
            state.maxScore += currentQuestion.points * 1.5;
            state.responses.push({ question: currentQuestion.question, response, score });

            // Show typing indicator
            showTyping();

            setTimeout(() => {
                hideTyping();

                // Generate feedback
                const feedback = generateFeedback(response, currentQuestion, score);

                state.questionIndex++;

                // Check if more questions or time remaining
                if (state.questionIndex < assessmentQuestions.length && state.timeRemaining > 30) {
                    addBotMessage(feedback + assessmentQuestions[state.questionIndex].question);
                } else {
                    completeAssessment();
                }
            }, 1000 + Math.random() * 500);
        }

        function completeAssessment() {
            if (state.assessmentComplete) return;
            state.assessmentComplete = true;

            clearInterval(state.timerInterval);
            state.knowledgeLevel = determineKnowledgeLevel();
            state.phase = 'lesson';

            // Update UI
            document.getElementById('phase-badge').textContent = 'Personalized Lesson';
            document.getElementById('phase-badge').className = 'phase-badge phase-lesson';
            document.getElementById('timer').textContent = '✓ Done';
            document.getElementById('progress-fill').style.width = '100%';

            showTyping();

            setTimeout(() => {
                hideTyping();

                const levelDisplay = {
                    beginner: { text: 'Beginner', class: 'level-beginner' },
                    intermediate: { text: 'Intermediate', class: 'level-intermediate' },
                    advanced: { text: 'Advanced', class: 'level-advanced' }
                };

                const level = levelDisplay[state.knowledgeLevel];
                const lesson = lessonContent[state.knowledgeLevel];

                const summaryHTML = `
                    <div class="knowledge-summary">
                        <h3>📊 Assessment Complete!</h3>
                        <p>Based on our conversation, I've assessed your knowledge level as:</p>
                        <p style="margin-top: 10px;">
                            <span class="knowledge-level ${level.class}">${level.text}</span>
                        </p>
                        <p style="margin-top: 10px;">I've prepared a personalized lesson: <strong>${lesson.title}</strong></p>
                    </div>
                    Great job completing the assessment! Now let's dive into learning. I'll adapt my teaching to match your level perfectly.
                `;

                addBotMessage(summaryHTML, true);

                setTimeout(() => {
                    startLesson();
                }, 2000);
            }, 1500);
        }

        function startLesson() {
            const lesson = lessonContent[state.knowledgeLevel];
            const topic = lesson.topics[state.lessonStep];

            showTyping();

            setTimeout(() => {
                hideTyping();

                const topicHTML = `
                    <div class="lesson-topic">📚 Topic ${state.lessonStep + 1}/${lesson.topics.length}: ${topic.name}</div>
                    ${topic.content}
                    <br><br>
                    <strong>Let's discuss:</strong> ${topic.question}
                    <div class="quick-replies">
                        ${topic.tips.map(tip => `<span class="quick-reply" onclick="selectQuickReply(this)">${tip}</span>`).join('')}
                    </div>
                `;

                addBotMessage(topicHTML, true);
            }, 1000);
        }

        function selectQuickReply(element) {
            document.getElementById('user-input').value = element.textContent;
        }

        function handleLessonResponse(response) {
            const lesson = lessonContent[state.knowledgeLevel];
            const topic = lesson.topics[state.lessonStep];

            showTyping();

            setTimeout(() => {
                hideTyping();

                // Provide contextual feedback based on level
                let feedback = '';

                if (state.knowledgeLevel === 'beginner') {
                    feedback = `Great thinking! ${response.length > 20 ? "I can see you're engaging with the material." : "Don't be afraid to elaborate on your thoughts."} `;
                } else if (state.knowledgeLevel === 'intermediate') {
                    feedback = `Good analysis! ${response.includes('because') || response.includes('since') ? "I appreciate that you're explaining your reasoning." : "Try to connect concepts together."} `;
                } else {
                    feedback = `Excellent insight! ${response.split(' ').length > 30 ? "Your detailed response shows sophisticated understanding." : "Let's explore even deeper."} `;
                }

                // Add teaching point
                const teachingPoints = {
                    beginner: [
                        "Remember, building good financial habits early pays off tremendously over time.",
                        "The key is to start small and be consistent. Even tiny steps lead to big changes.",
                        "Don't worry about being perfect - progress is what matters most."
                    ],
                    intermediate: [
                        "Consider how these concepts interconnect - finance is rarely about isolated decisions.",
                        "Think about both the quantitative and behavioral aspects of these strategies.",
                        "The best financial decisions balance theory with practical implementation."
                    ],
                    advanced: [
                        "Always consider second-order effects and market dynamics in your analysis.",
                        "Remember that even sophisticated strategies must account for human psychology.",
                        "The edge often comes from synthesizing information others overlook."
                    ]
                };

                const randomTeaching = teachingPoints[state.knowledgeLevel][Math.floor(Math.random() * 3)];

                addBotMessage(feedback + randomTeaching);

                state.lessonStep++;

                // Check if more topics
                setTimeout(() => {
                    if (state.lessonStep < lesson.topics.length) {
                        startLesson();
                    } else {
                        completeLessons();
                    }
                }, 2000);

            }, 1200 + Math.random() * 800);
        }

        function completeLessons() {
            showTyping();

            setTimeout(() => {
                hideTyping();

                const completionHTML = `
                    <div class="knowledge-summary">
                        <h3>🎉 Lesson Complete!</h3>
                        <p>Congratulations on completing your personalized finance lesson!</p>
                        <p style="margin-top: 10px;"><strong>Key takeaways:</strong></p>
                        <ul style="margin-top: 10px; padding-left: 20px;">
                            ${lessonContent[state.knowledgeLevel].topics.map(t => `<li>${t.name}</li>`).join('')}
                        </ul>
                    </div>
                    You've shown great engagement throughout this session. Remember, financial literacy is a journey, not a destination. Keep learning and applying these concepts!
                    <br><br>
                    <button class="restart-btn" onclick="location.reload()">Start New Session</button>
                `;

                addBotMessage(completionHTML, true);

                document.getElementById('user-input').disabled = true;
                document.getElementById('send-btn').disabled = true;

            }, 1500);
        }

        // Event Listeners
        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Start the app
        init();
    </script>
</body>
</html>
